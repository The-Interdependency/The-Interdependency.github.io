name: Deploy emergency static edition

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Why the emergency edition is being deployed
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify-and-deploy:
    name: Verify and deploy fallback
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify explicit fallback artifact
        env:
          DEPLOY_REASON: ${{ inputs.reason }}
        run: |
          test -s fallback/index.html
          test -s fallback/fallback.css
          ! grep -qi '<script' fallback/index.html
          printf '%s\n' "$DEPLOY_REASON" > fallback/DEPLOYMENT_REASON.txt

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload fallback Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: fallback

      - name: Deploy fallback to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
