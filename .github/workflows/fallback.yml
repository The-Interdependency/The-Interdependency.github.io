name: Deploy emergency static edition

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Why the emergency edition is being deployed
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify-and-deploy:
    name: Verify and deploy fallback
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6, node24

      - name: Verify explicit fallback artifact
        env:
          DEPLOY_REASON: ${{ inputs.reason }}
        run: |
          test -s fallback/index.html
          test -s fallback/fallback.css
          ! grep -qi '<script' fallback/index.html
          printf '%s\n' "$DEPLOY_REASON" > fallback/DEPLOYMENT_REASON.txt

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6, node24

      - name: Upload fallback Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5, composite; internal upload-artifact v7
        with:
          path: fallback

      - name: Deploy fallback to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5, node24
