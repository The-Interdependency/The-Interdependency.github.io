- id: patrick-williams-2012-sdt-health
  title: "Self-determination theory: its application to health behavior and complementarity with motivational interviewing"
  authors: "Heather Patrick; Geoffrey C. Williams"
  year: 2012
  publication: "International Journal of Behavioral Nutrition and Physical Activity 9:18"
  type: peer-reviewed review
  doi: "10.1186/1479-5868-9-18"
  url: "https://doi.org/10.1186/1479-5868-9-18"
  reviewed_on: "2026-07-21"
  relevance: "Distinguishes autonomous motivation from pressured or coerced behavior and identifies autonomy, competence, and relatedness as central conditions for sustained health behavior."
  boundary: "Supports an autonomy-preserving design principle; does not validate Article Two as a whole."

- id: who-2018-sanitation-health
  title: "Guidelines on sanitation and health"
  authors: "World Health Organization"
  year: 2018
  publication: "World Health Organization guideline"
  type: evidence-informed guideline
  isbn: "978-92-4-151470-5"
  url: "https://www.who.int/publications/i/item/9789241514705"
  reviewed_on: "2026-07-21"
  relevance: "Synthesizes evidence connecting safe sanitation with infection prevention and mental and social well-being."
  boundary: "Supports treating sanitation as survival work; does not determine how duties should be allocated."

- id: mani-et-al-2013-poverty-cognition
  title: "Poverty impedes cognitive function"
  authors: "Anandi Mani; Sendhil Mullainathan; Eldar Shafir; Jiaying Zhao"
  year: 2013
  publication: "Science 341(6149):976-980"
  type: peer-reviewed empirical study
  doi: "10.1126/science.1238041"
  url: "https://doi.org/10.1126/science.1238041"
  reviewed_on: "2026-07-21"
  relevance: "Finds that poverty-related concerns consume cognitive resources and reduce performance, including within the same people under different financial conditions."
  boundary: "Warns that apparent willingness, refusal, or competence may be distorted by scarcity and should not be read as unconstrained choice."

- id: ahrq-2025-trauma-informed-care
  title: "Trauma Informed Care: A Systematic Review"
  authors: "Viann N. Nguyen-Feng et al."
  year: 2025
  publication: "Agency for Healthcare Research and Quality, Report 25-EHC007"
  type: systematic review
  doi: "10.23970/AHRQEPCSRTRAUMA"
  url: "https://www.ncbi.nlm.nih.gov/books/NBK614496/"
  reviewed_on: "2026-07-21"
  relevance: "Assesses trauma-informed care models and patient or client outcomes across healthcare and social-service settings."
  boundary: "Evidence was insufficient for clear outcome determinations; trauma-informed language must not be presented as evidence-closed."

- id: gundersen-ziliak-2015-food-insecurity
  title: "Food insecurity and health outcomes"
  authors: "Craig Gundersen; James P. Ziliak"
  year: 2015
  publication: "Health Affairs 34(11):1830-1839"
  type: peer-reviewed review
  doi: "10.1377/hlthaff.2015.0645"
  url: "https://doi.org/10.1377/hlthaff.2015.0645"
  reviewed_on: "2026-07-21"
  relevance: "Reviews evidence linking food insecurity with adverse health outcomes and describes nutrition assistance as an important means of reducing food insecurity."
  boundary: "Supports a material survival floor; it does not determine contribution rules, sanctions, or allocation under acute scarcity."

- id: andersson-pearson-1999-incivility
  title: "Tit for Tat? The Spiraling Effect of Incivility in the Workplace"
  authors: "Lynne M. Andersson; Christine M. Pearson"
  year: 1999
  publication: "Academy of Management Review 24(3):452-471"
  type: peer-reviewed theoretical article
  doi: "10.5465/AMR.1999.2202131"
  url: "https://doi.org/10.5465/AMR.1999.2202131"
  reviewed_on: "2026-07-21"
  relevance: "Models how low-intensity incivility can pass tipping points and spiral into increasingly aggressive reciprocal behavior."
  boundary: "Supports treating automatic reciprocity as an escalation risk; it does not establish that every conflict follows the proposed spiral."

- id: ahrq-2023-teamstepps
  title: "TeamSTEPPS 3.0"
  authors: "Agency for Healthcare Research and Quality"
  year: 2023
  publication: "AHRQ evidence-based teamwork and patient-safety curriculum"
  type: evidence-based implementation framework
  url: "https://www.ahrq.gov/teamstepps-program/index.html"
  reviewed_on: "2026-07-21"
  relevance: "Organizes communication, team leadership, situation monitoring, mutual support, and active patient involvement into trainable tools."
  boundary: "Supports structured high-consequence communication in healthcare; transfer to other domains requires contextual validation."

- id: nagin-telep-2017-procedural-justice
  title: "Procedural Justice and Legal Compliance"
  authors: "Daniel S. Nagin; Cody W. Telep"
  year: 2017
  publication: "Annual Review of Law and Social Science 13:5-28"
  type: peer-reviewed review
  doi: "10.1146/annurev-lawsocsci-110316-113310"
  url: "https://doi.org/10.1146/annurev-lawsocsci-110316-113310"
  reviewed_on: "2026-07-21"
  relevance: "Finds consistent associations among perceived procedural justice, legitimacy, and compliance in perception-based studies."
  boundary: "The review explicitly states that a causal chain from changed institutional practice to changed compliance had not been established."

- id: who-2001-icf
  title: "International Classification of Functioning, Disability and Health"
  authors: "World Health Organization"
  year: 2001
  publication: "WHO international classification and framework"
  type: international standard framework
  url: "https://www.who.int/standards/classifications/international-classification-of-functioning-disability-and-health"
  reviewed_on: "2026-07-21"
  relevance: "Treats functioning and disability as contextual, including environmental factors rather than locating capacity only inside the person."
  boundary: "Provides a framework for describing functioning; it does not define civic adulthood or authorize removal of legal status."

- id: who-2022-uhc-competency
  title: "Global Competency and Outcomes Framework for Universal Health Coverage"
  authors: "World Health Organization"
  year: 2022
  publication: "World Health Organization technical document"
  type: competency framework
  isbn: "978-92-4-003466-2"
  url: "https://www.who.int/publications/i/item/9789240034662"
  reviewed_on: "2026-07-21"
  relevance: "Defines role-relevant competency domains and connects outcomes with curricula, learning activities, and assessment approaches."
  boundary: "Supports field-specific demonstrated competence; it applies to health-worker education, not universal political standing."

- id: fema-2017-nims
  title: "National Incident Management System, Third Edition"
  authors: "Federal Emergency Management Agency"
  year: 2017
  publication: "FEMA incident-management doctrine"
  type: official operational framework
  url: "https://training.fema.gov/is/coursematerials.aspx?code=IS-700.b"
  reviewed_on: "2026-07-21"
  relevance: "Defines common terminology, command and coordination structures, resource management, transfer, and demobilization for incidents."
  boundary: "Supports bounded emergency authority and interoperable command; incident doctrine is not a general constitution for ordinary governance."

- id: ietf-1997-rfc2119
  title: "RFC 2119: Key words for use in RFCs to Indicate Requirement Levels"
  authors: "Scott Bradner"
  year: 1997
  publication: "Internet Engineering Task Force Best Current Practice 14"
  type: technical standard
  doi: "10.17487/RFC2119"
  url: "https://www.rfc-editor.org/info/rfc2119/"
  reviewed_on: "2026-07-21"
  relevance: "Defines consistent meanings for MUST, MUST NOT, SHOULD, SHOULD NOT, and MAY in technical specifications."
  boundary: "Demonstrates the value of controlled normative language; it does not settle moral, legal, or ordinary-language definitions."

- id: ietf-2017-rfc8174
  title: "RFC 8174: Ambiguity of Uppercase vs Lowercase in RFC 2119 Key Words"
  authors: "Barry Leiba"
  year: 2017
  publication: "Internet Engineering Task Force Best Current Practice 14"
  type: technical standard clarification
  doi: "10.17487/RFC8174"
  url: "https://www.rfc-editor.org/info/rfc8174/"
  reviewed_on: "2026-07-21"
  relevance: "Clarifies when standardized requirement words carry their defined force and reduces ambiguity caused by inconsistent capitalization."
  boundary: "The clarification is limited to documents invoking BCP 14 and should not be projected onto all speech."

- id: hhs-1979-belmont-report
  title: "The Belmont Report: Ethical Principles and Guidelines for the Protection of Human Subjects of Research"
  authors: "National Commission for the Protection of Human Subjects of Biomedical and Behavioral Research"
  year: 1979
  publication: "United States Department of Health and Human Services"
  type: foundational ethics report
  url: "https://www.hhs.gov/ohrp/regulations-and-policy/belmont-report/read-the-belmont-report/index.html"
  reviewed_on: "2026-07-21"
  relevance: "Connects respect for persons with information, comprehension, and voluntariness; also requires risk-benefit assessment and protection for diminished autonomy."
  boundary: "Governs human-subject research ethics and supplies a strong consent model; not every civil or private interaction is research."

- id: ndumele-et-al-2025-snap-work-requirements
  title: "Supplemental Nutrition Assistance Program Work Requirements and Safety-Net Program Participation"
  authors: "Chima D. Ndumele; Hannah Factor; Matthew Lavallee; Anthony Lollo Jr.; Jacob Wallace"
  year: 2025
  publication: "JAMA Internal Medicine 185(1):92-100"
  type: peer-reviewed quasi-experimental cohort study
  doi: "10.1001/jamainternmed.2024.5932"
  url: "https://doi.org/10.1001/jamainternmed.2024.5932"
  reviewed_on: "2026-07-23"
  relevance: "Finds that reinstated SNAP work requirements in Connecticut were associated with a substantial enrollment decline concentrated among clinically and socioeconomically vulnerable beneficiaries, without evidence of transition off the broader safety net."
  boundary: "Studies one state policy and program-enrollment outcomes; it does not determine moral contribution, global food allocation, or the effects of every work requirement."

- id: talevski-et-al-2020-teach-back
  title: "Teach-back: A systematic review of implementation and impacts"
  authors: "Jason Talevski; Anna Wong Shee; Bodil Rasmussen; Georgie Kemp; Alison Beauchamp"
  year: 2020
  publication: "PLOS ONE 15(4):e0231350"
  type: peer-reviewed systematic review
  doi: "10.1371/journal.pone.0231350"
  url: "https://doi.org/10.1371/journal.pone.0231350"
  reviewed_on: "2026-07-23"
  relevance: "Reviews evidence that teach-back can improve health-related knowledge, recall, self-management, and some outcomes by requiring an explanation in the recipient's own words."
  boundary: "The included studies were heterogeneous and generally moderate quality; health education evidence does not establish that teach-back generalizes to all law or makes enforcement legitimate."

- id: webb-2020-legislative-complexity
  title: "The Drafters’ Dance: The Complexity of Drafting Legislation and the Limitations of ‘Plain Language’ and ‘Good Law’ Initiatives"
  authors: "Thomas E. Webb"
  year: 2020
  publication: "Statute Law Review 41(2):129-158"
  type: peer-reviewed legal analysis
  doi: "10.1093/slr/hmz008"
  url: "https://doi.org/10.1093/slr/hmz008"
  reviewed_on: "2026-07-23"
  relevance: "Argues that legislative drafting contains irreducible technical and institutional complexity that plain-language and good-law initiatives can obscure or displace."
  boundary: "A theoretical legal analysis of drafting complexity; it does not excuse avoidable opacity, secret rules, inadequate notice, or failure to teach applicable duties."

- id: un-crpd-2014-legal-capacity
  title: "General comment No. 1 (2014), Article 12: Equal recognition before the law"
  authors: "United Nations Committee on the Rights of Persons with Disabilities"
  year: 2014
  publication: "United Nations document CRPD/C/GC/1"
  type: treaty-body interpretive guidance
  url: "https://cambodia.ohchr.org/en/content/general-comment-no-1-committee-rights-persons-disabilities-equal-recognition-law"
  reviewed_on: "2026-07-23"
  relevance: "Distinguishes universal legal capacity from variable mental capacity and requires support for exercising rights rather than status removal based on impairment or functional assessment."
  boundary: "Authoritative human-rights interpretation rather than an empirical outcome study; it does not prohibit task-specific competency requirements for hazardous professional roles or supported-decision safeguards."

- id: stephan-chenoweth-2008-civil-resistance
  title: "Why Civil Resistance Works: The Strategic Logic of Nonviolent Conflict"
  authors: "Maria J. Stephan; Erica Chenoweth"
  year: 2008
  publication: "International Security 33(1):7-44"
  type: peer-reviewed comparative empirical study
  doi: "10.1162/isec.2008.33.1.7"
  url: "https://doi.org/10.1162/isec.2008.33.1.7"
  reviewed_on: "2026-07-23"
  relevance: "Compares major violent and nonviolent campaigns and identifies participation, legitimacy, and loyalty shifts as mechanisms through which nonviolent collective power can prevail."
  boundary: "Campaign-level historical evidence is not a complete theory of authority, does not show that violence is never decisive, and does not replace bounded emergency command."

- id: rosch-1975-semantic-categories
  title: "Cognitive representations of semantic categories"
  authors: "Eleanor Rosch"
  year: 1975
  publication: "Journal of Experimental Psychology: General 104(3):192-233"
  type: peer-reviewed experimental study
  doi: "10.1037/0096-3445.104.3.192"
  url: "https://doi.org/10.1037/0096-3445.104.3.192"
  reviewed_on: "2026-07-23"
  relevance: "Shows that many ordinary semantic categories have graded internal structure and that typicality affects how people learn and process category members."
  boundary: "Experiments on semantic categories do not govern legal drafting or technical interface standards; stipulative definitions remain useful for consequential load-bearing terms."

- id: solove-2013-consent-dilemma
  title: "Privacy Self-Management and the Consent Dilemma"
  authors: "Daniel J. Solove"
  year: 2013
  publication: "Harvard Law Review 126:1880-1903"
  type: legal analysis grounded in empirical and social-science literature
  url: "https://harvardlawreview.org/print/vol-126/introduction-privacy-self-management-and-the-consent-dilemma/"
  reviewed_on: "2026-07-23"
  relevance: "Explains how cognitive limits, information volume, aggregation, downstream uses, and collective effects make notice-and-consent insufficient as the sole governance mechanism for personal data."
  boundary: "Addresses information privacy; it does not negate informed consent in medicine or research and does not establish that consent is irrelevant in other domains."
