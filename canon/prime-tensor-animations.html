<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Tensor Explorer | The Interdependent Way</title>
    <style>
        body {
            margin: 0; padding: 0; background: #0a0a0a; color: #ddd; font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .container {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 100vh;
        }
        .controls {
            background: #111; padding: 20px; overflow-y: auto; border-right: 1px solid #333;
        }
        .canvas-container {
            position: relative; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px;
        }
        canvas {
            background: #000; border: 1px solid #222; border-radius: 8px; image-rendering: crisp-edges;
        }
        h1 { font-size: 1.4rem; margin: 0 0 20px 0; color: #88ccff; text-align: center; }
        label, button, input, select { display: block; margin: 12px 0; width: 100%; }
        button {
            background: #334466; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        button:hover { background: #5577aa; }
        button.playing { background: #228822; }
        .output {
            background: #1a1a1a; padding: 12px; border-radius: 6px; font-family: monospace; min-height: 1.2em; text-align: center;
        }
        .section { margin-bottom: 25px; }
        .tensor-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at center, rgba(30,60,120,0.08) 0%, transparent 70%);
            pointer-events: none; z-index: -1;
        }
    </style>
</head>
<body>
    <div class="tensor-bg"></div>
    <div class="container">
        <!-- Controls -->
        <div class="controls">
            <h1>Prime Tensor Explorer</h1>
            
            <div class="section">
                <label>Current Number</label>
                <div id="currentNumber" class="output">1</div>
            </div>

            <div class="section">
                <label>Test if Prime</label>
                <input type="number" id="testInput" value="53" style="padding:10px;background:#222;color:white;border:none;border-radius:4px;">
                <button onclick="checkPrime()">Check Prime</button>
                <div id="primeResult" class="output" style="margin-top:8px;"></div>
            </div>

            <div class="section">
                <button id="playButton" onclick="toggleAnimation()" style="font-size:1.1rem;padding:14px;">▶ Play Animation</button>
            </div>

            <div class="section">
                <label>Speed</label>
                <input type="range" id="speedSlider" min="10" max="200" value="50" oninput="setSpeed(this.value)">
                <span id="speedValue">50 ms</span>
            </div>

            <div class="section">
                <label>Visualization Mode</label>
                <select id="modeSelect" onchange="switchMode()" style="padding:10px;background:#222;color:white;border:none;width:100%;">
                    <option value="unitcircle">Unit Circle Growth</option>
                    <option value="cylinder">Cylinder View</option>
                    <option value="cartesian2d">Cartesian 2D</option>
                    <option value="cartesian3d">Cartesian 3D</option>
                    <option value="zeta">Zeta Function</option>
                </select>
            </div>

            <div class="section">
                <label>Series Overlays</label>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.9rem;">
                    <label><input type="checkbox" id="showPrimes" checked onchange="redraw()"> Primes</label>
                    <label><input type="checkbox" id="showTwins" onchange="redraw()"> Twin Primes (green)</label>
                    <label><input type="checkbox" id="showGaps" onchange="redraw()"> Prime Gaps</label>
                    <label><input type="checkbox" id="showSquares" onchange="redraw()"> Squares</label>
                    <label><input type="checkbox" id="showFib" onchange="redraw()"> Fibonacci</label>
                </div>
            </div>

            <div class="section">
                <label>Max Numbers</label>
                <input type="range" id="maxRange" min="100" max="10000" value="2000" step="100" oninput="updateMax(this.value)">
                <span id="maxValue">2000</span>
            </div>

            <button onclick="resetAnimation()" style="margin-top:20px;">Reset</button>
        </div>

        <!-- Visualizations -->
        <div class="canvas-container">
            <canvas id="mainCanvas" width="620" height="620"></canvas>
            <canvas id="secondaryCanvas" width="620" height="620"></canvas>
        </div>
    </div>

    <script>
        const mainCanvas = document.getElementById('mainCanvas');
        const ctx = mainCanvas.getContext('2d');
        let primes = [];
        let maxN = 2000;
        let currentStep = 1;
        let isPlaying = false;
        let animationFrame;
        let speed = 50;

        function isPrime(n) {
            if (n < 2) return false;
            for (let i = 2; i <= Math.sqrt(n); i++) {
                if (n % i === 0) return false;
            }
            return true;
        }

        function generatePrimes(limit) {
            primes = [];
            for (let i = 2; i <= limit; i++) {
                if (isPrime(i)) primes.push(i);
            }
        }

        function checkPrime() {
            const input = parseInt(document.getElementById('testInput').value);
            const resultEl = document.getElementById('primeResult');
            if (isPrime(input)) {
                resultEl.style.color = '#66ff99';
                resultEl.textContent = `${input} is PRIME ✓`;
            } else {
                resultEl.style.color = '#ff6666';
                resultEl.textContent = `${input} is not prime`;
            }
        }

        function updateMax(val) {
            document.getElementById('maxValue').textContent = val;
            maxN = parseInt(val);
            generatePrimes(maxN);
            redraw();
        }

        function setSpeed(val) {
            speed = parseInt(val);
            document.getElementById('speedValue').textContent = speed + " ms";
        }

        function drawUnitCircle() {
            ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
            const centerX = mainCanvas.width / 2;
            const centerY = mainCanvas.height / 2;
            const radius = 270;

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.strokeStyle = '#334466';
            ctx.lineWidth = 4;
            ctx.stroke();

            const step = Math.PI * 2 / 360;
            for (let p of primes) {
                if (p > currentStep) break;
                const angle = (p % 360) * step;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                
                ctx.fillStyle = '#88ccff';
                ctx.fillRect(x-2, y-2, 4, 4);
            }
            document.getElementById('currentNumber').textContent = currentStep;
        }

        function redraw() {
            drawUnitCircle();
        }

        function animate() {
            if (!isPlaying) return;
            currentStep += Math.max(1, Math.floor(maxN / 300));
            if (currentStep > maxN) {
                currentStep = maxN;
                toggleAnimation();
                return;
            }
            redraw();
            animationFrame = setTimeout(animate, speed);
        }

        function toggleAnimation() {
            const btn = document.getElementById('playButton');
            isPlaying = !isPlaying;
            if (isPlaying) {
                btn.textContent = '❚❚ Pause';
                btn.classList.add('playing');
                animate();
            } else {
                btn.textContent = '▶ Play Animation';
                btn.classList.remove('playing');
                clearTimeout(animationFrame);
            }
        }

        function resetAnimation() {
            currentStep = 1;
            isPlaying = false;
            document.getElementById('playButton').textContent = '▶ Play Animation';
            document.getElementById('playButton').classList.remove('playing');
            redraw();
        }

        function switchMode() {
            console.log("Mode switched to:", document.getElementById('modeSelect').value);
            redraw();
        }

        // Initialize
        generatePrimes(maxN);
        redraw();
        
        console.log("%cPrime Tensor Explorer initialized", "color:#88ccff;font-weight:bold");
    </script>
</body>
</html>
